server {  
    listen 80;  
    root /usr/share/nginx/html;  
    index index.html;  
  
    # Redirige todas las rutas al index.html (Angular Router)  
    location / {  
        try_files $uri $uri/ /index.html;  
    }  
  
    # Cache agresivo para assets con hash (generados por ng build)  
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {  
        expires 1y;  
        add_header Cache-Control "public, immutable";  
    }  
}